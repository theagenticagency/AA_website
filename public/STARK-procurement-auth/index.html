<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <title>STARK Procurement — Access</title>
    <style>
        :root {
            --aa-black: #000000;
            --aa-white: #FFFFFF;
            --aa-cement: #E6E6E1;
            --aa-cement-50: #73736F;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--aa-black);
            color: var(--aa-white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            text-align: center;
            padding: 60px 40px;
            max-width: 400px;
            width: 100%;
        }

        .logo {
            font-size: 0.9rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--aa-cement-50);
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--aa-cement-50);
            font-size: 0.95rem;
            margin-bottom: 3rem;
        }

        .password-input {
            width: 100%;
            padding: 16px 20px;
            font-size: 1rem;
            background: transparent;
            border: 1px solid var(--aa-cement-50);
            color: var(--aa-white);
            text-align: center;
            letter-spacing: 0.1em;
            margin-bottom: 1.5rem;
            transition: border-color 0.2s;
        }

        .password-input:focus {
            outline: none;
            border-color: var(--aa-white);
        }

        .password-input::placeholder {
            color: var(--aa-cement-50);
            letter-spacing: 0.05em;
        }

        .submit-btn {
            width: 100%;
            padding: 16px 20px;
            font-size: 1rem;
            font-weight: 600;
            background: var(--aa-white);
            color: var(--aa-black);
            border: none;
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: opacity 0.2s;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }

        .error {
            color: #ff6b6b;
            font-size: 0.9rem;
            margin-top: 1rem;
            display: none;
        }

        .error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">The Agentic Agency</div>
        <h1>STARK Procurement</h1>
        <p class="subtitle">Protected presentation</p>

        <form id="authForm">
            <input
                type="password"
                class="password-input"
                id="password"
                placeholder="Enter access code"
                autocomplete="off"
                autofocus
            >
            <button type="submit" class="submit-btn">Access</button>
        </form>
        <p class="error" id="error">Invalid access code</p>
    </div>

    <script>
        document.getElementById('authForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;

            // Simple hash check (not secure, but adequate for presentation access)
            if (password === 'ADAPT2026') {
                // Set cookie valid for 24 hours
                document.cookie = 'stark_auth=verified; path=/; max-age=86400; SameSite=Strict';
                // Redirect to presentation
                window.location.href = '/STARK-procurement/';
            } else {
                document.getElementById('error').classList.add('show');
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        });
    </script>
</body>
</html>
